name: CI

# Trigger on every push to main.
on:
  push:
    branches:
      - main

env:
  # ghcr.io is GitHub's free container registry.
  # Images are stored at ghcr.io/GITHUB_USERNAME/IMAGE_NAME.
  IMAGE_NAME: ghcr.io/generalsanjeet/hello-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Required permissions for pushing to ghcr.io.
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1 — check out the code.
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2 — set up Go.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      # Step 3 — run tests.
      # If tests fail, the workflow stops here. No deploy.
      - name: Run tests
        run: go test ./... -v

      # Step 4 — log in to GitHub Container Registry.
      # GITHUB_TOKEN is automatically provided by GitHub Actions —
      # you don't need to create this secret manually.
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 5 — build and push the Docker image.
      # We tag with the full Git commit SHA for exact traceability.
      # Every image is uniquely identified by the commit that built it.
      - name: Build and push image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      # Step 6 — call your IDP to deploy the new image.
      # IDP_URL is the public URL of your IDP server (set via ngrok in Step 4).
      # We use the commit SHA as the image tag for exact version tracking.
      - name: Deploy via IDP
        run: |
          curl -X POST ${{ secrets.IDP_URL }}/deploy/hello-service \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"${{ env.IMAGE_NAME }}:${{ github.sha }}\"}" \
            --fail \
            --retry 3 \
            --retry-delay 5
